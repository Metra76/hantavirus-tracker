<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#030810"/>
  <rect width="1200" height="630" fill="url(#g1)" opacity="0.5"/>
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ff2233" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#030810" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Grid -->
  <line x1="0" y1="157" x2="1200" y2="157" stroke="#0e2035" stroke-width="1"/>
  <line x1="0" y1="314" x2="1200" y2="314" stroke="#0e2035" stroke-width="1"/>
  <line x1="0" y1="471" x2="1200" y2="471" stroke="#0e2035" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="630" stroke="#0e2035" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#0e2035" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="630" stroke="#0e2035" stroke-width="1"/>

  <!-- Red top line -->
  <rect x="0" y="0" width="1200" height="3" fill="#ff2233" opacity="0.8"/>

  <!-- Biohazard symbol -->
  <g transform="translate(140,315) scale(0.7)" opacity="0.15">
    <circle cx="0" cy="-90" r="55" fill="none" stroke="#ff2233" stroke-width="35"/>
    <circle cx="0" cy="-90" r="55" fill="none" stroke="#030810" stroke-width="18"/>
    <circle cx="-78" cy="45" r="55" fill="none" stroke="#ff2233" stroke-width="35"/>
    <circle cx="-78" cy="45" r="55" fill="none" stroke="#030810" stroke-width="18"/>
    <circle cx="78" cy="45" r="55" fill="none" stroke="#ff2233" stroke-width="35"/>
    <circle cx="78" cy="45" r="55" fill="none" stroke="#030810" stroke-width="18"/>
    <circle cx="0" cy="0" r="34" fill="#ff2233"/>
    <circle cx="0" cy="0" r="20" fill="#030810"/>
    <circle cx="0" cy="0" r="8" fill="#ff2233"/>
  </g>

  <!-- Pulsing dots (map-like) -->
  <circle cx="220" cy="380" r="18" fill="#ff2233" opacity="0.7"/>
  <circle cx="220" cy="380" r="30" fill="none" stroke="#ff2233" stroke-width="2" opacity="0.3"/>
  <circle cx="380" cy="290" r="8" fill="#ff2233" opacity="0.5"/>
  <circle cx="480" cy="340" r="12" fill="#ff8800" opacity="0.5"/>
  <circle cx="700" cy="200" r="24" fill="#33bbff" opacity="0.4"/>
  <circle cx="750" cy="280" r="16" fill="#ffdd00" opacity="0.4"/>
  <circle cx="950" cy="250" r="20" fill="#ffdd00" opacity="0.4"/>
  <circle cx="1050" cy="180" r="10" fill="#ff2233" opacity="0.4"/>
  <circle cx="160" cy="200" r="6" fill="#ff8800" opacity="0.4"/>

  <!-- LIVE badge -->
  <rect x="420" y="148" width="70" height="24" rx="2" fill="rgba(255,34,51,0.15)" stroke="#ff2233" stroke-width="1" stroke-opacity="0.5"/>
  <circle cx="435" cy="160" r="5" fill="#ff2233"/>
  <text x="446" y="165" font-family="'Courier New',monospace" font-size="13" fill="#ff2233" letter-spacing="2">LIVE</text>

  <!-- Main title -->
  <text x="600" y="270" font-family="Arial Black,sans-serif" font-size="82" font-weight="900"
    fill="#ff2233" text-anchor="middle" letter-spacing="4"
    style="text-shadow:0 0 40px rgba(255,34,51,0.8)">HANTAVIRUS</text>
  <text x="600" y="340" font-family="'Courier New',monospace" font-size="30"
    fill="#e8f0f8" text-anchor="middle" letter-spacing="8">GLOBAL TRACKER</text>

  <!-- Separator -->
  <line x1="360" y1="368" x2="840" y2="368" stroke="#1a3050" stroke-width="1"/>

  <!-- Stats row -->
  <text x="420" y="410" font-family="'Courier New',monospace" font-size="16" fill="#ff2233" text-anchor="middle" font-weight="bold">8 CASES</text>
  <text x="420" y="428" font-family="'Courier New',monospace" font-size="10" fill="#3a5a78" text-anchor="middle" letter-spacing="1">MV HONDIUS</text>

  <text x="600" y="410" font-family="'Courier New',monospace" font-size="16" fill="#ff8800" text-anchor="middle" font-weight="bold">3 DEATHS</text>
  <text x="600" y="428" font-family="'Courier New',monospace" font-size="10" fill="#3a5a78" text-anchor="middle" letter-spacing="1">38% LETHALITY</text>

  <text x="780" y="410" font-family="'Courier New',monospace" font-size="16" fill="#ffdd00" text-anchor="middle" font-weight="bold">ANDES STRAIN</text>
  <text x="780" y="428" font-family="'Courier New',monospace" font-size="10" fill="#3a5a78" text-anchor="middle" letter-spacing="1">P2P CONFIRMED</text>

  <!-- URL -->
  <text x="600" y="490" font-family="'Courier New',monospace" font-size="18"
    fill="#3a5a78" text-anchor="middle" letter-spacing="2">hantavirusglobaltracker.com</text>

  <!-- Bottom tagline -->
  <text x="600" y="530" font-family="'Courier New',monospace" font-size="13"
    fill="#1a3050" text-anchor="middle" letter-spacing="2">CASES · STRAINS · MORTALITY · REAL-TIME SURVEILLANCE</text>

  <!-- Bottom red line -->
  <rect x="0" y="627" width="1200" height="3" fill="#ff2233" opacity="0.4"/>
</svg>

name: Update Hantavirus Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update hantavirus data
        run: |
          node -e "
          const https = require('https');

          const prompt = \`Search for the latest hantavirus outbreak data worldwide today. Include MV Hondius cruise ship outbreak, Argentina season, any new cases. Return ONLY a valid JSON array. Each item must have: country, region (america/europe/asia/africa), lat, lng, cases, deaths, lethality (0-100), year, year_label, status (active/historic), strain, p2p (boolean), note (max 200 chars), highlight (boolean). No markdown, no explanation, just the JSON array.\`;

          const body = JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4000,
            tools: [{type: 'web_search_20250305', name: 'web_search'}],
            messages: [{role: 'user', content: prompt}]
          });

          const req = https.request({
            hostname: 'api.anthropic.com',
            path: '/v1/messages',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-api-key': '${{ secrets.CLAUDE_API_KEY }}',
              'anthropic-version': '2023-06-01',
              'Content-Length': Buffer.byteLength(body)
            }
          }, res => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', async () => {
              try {
                const parsed = JSON.parse(data);
                const text = parsed.content.filter(b => b.type === 'text').map(b => b.text).join('');
                const start = text.indexOf('[');
                const end = text.lastIndexOf(']');
                if (start === -1) throw new Error('No JSON array found');
                const outbreaks = JSON.parse(text.substring(start, end + 1));
                console.log('Got', outbreaks.length, 'outbreaks');

                // Delete existing
                const delRes = await fetch('${{ secrets.SUPABASE_URL }}/rest/v1/hantavirus_outbreaks?id=gt.0', {
                  method: 'DELETE',
                  headers: {
                    'apikey': '${{ secrets.SUPABASE_SERVICE_KEY }}',
                    'Authorization': 'Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}'
                  }
                });

                // Insert new
                const insRes = await fetch('${{ secrets.SUPABASE_URL }}/rest/v1/hantavirus_outbreaks', {
                  method: 'POST',
                  headers: {
                    'apikey': '${{ secrets.SUPABASE_SERVICE_KEY }}',
                    'Authorization': 'Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}',
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                  },
                  body: JSON.stringify(outbreaks.map(o => ({
                    country: o.country,
                    region: o.region || 'america',
                    lat: o.lat || 0,
                    lng: o.lng || 0,
                    cases: o.cases || 0,
                    deaths: o.deaths || 0,
                    lethality: o.lethality || 0,
                    year: o.year || 2026,
                    year_label: o.year_label || String(o.year),
                    status: o.status || 'historic',
                    strain: o.strain || 'Andes',
                    p2p: o.p2p || false,
                    note: (o.note || '').substring(0, 500),
                    highlight: o.highlight || false,
                    updated_at: new Date().toISOString()
                  })))
                });

                console.log('Insert status:', insRes.status);
              } catch(e) {
                console.error('Error:', e.message);
                process.exit(1);
              }
            });
          });
          req.write(body);
          req.end();
          "
